<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiredup Weather</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    h1 { font-size: 1.5rem; margin-bottom: 1.25rem; color: #7dd3fc; }
    form { display: flex; gap: .5rem; }
    input[type="text"] {
      flex: 1;
      padding: .65rem 1rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
    }
    input[type="text"]:focus { outline: 2px solid #38bdf8; border-color: transparent; }
    button {
      padding: .65rem 1.25rem;
      border-radius: 8px;
      border: none;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover { background: #7dd3fc; }
    .result { margin-top: 1.5rem; }
    .city-name { font-size: 1.25rem; font-weight: 700; margin-bottom: .75rem; color: #f1f5f9; }
    .stat { display: flex; justify-content: space-between; padding: .5rem 0; border-bottom: 1px solid #334155; }
    .stat:last-child { border-bottom: none; }
    .label { color: #94a3b8; }
    .value { font-weight: 600; }
    .error {
      margin-top: 1rem;
      padding: .75rem 1rem;
      background: #7f1d1d;
      border-radius: 8px;
      color: #fca5a5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚡ Wiredup Weather</h1>
    <form method="POST">
      <input type="text" name="city" placeholder="Enter city…" value="{{ city }}" autofocus />
      <button type="submit">Go</button>
    </form>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    {% if weather %}
      <div class="result">
        <div class="city-name">{{ weather.city }}</div>
        <div class="stat">
          <span class="label">Condition</span>
          <span class="value">{{ weather.description }}</span>
        </div>
        <div class="stat">
          <span class="label">Temperature</span>
          <span class="value">{{ weather.temperature }} °C</span>
        </div>
        <div class="stat">
          <span class="label">Wind speed</span>
          <span class="value">{{ weather.windspeed }} km/h</span>
        </div>
        <div class="stat">
          <span class="label">Time of day</span>
          <span class="value">{{ "Day" if weather.is_day else "Night" }}</span>
        </div>
      </div>
    {% endif %}
  </div>
</body>
</html>
